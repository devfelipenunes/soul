name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Bindings
        run: |
          cd packages/zolvency-registry && npm install && npm run build
          cd ../github-identity && npm install && npm run build

      - name: Lint
        run: npm run lint

      - name: Build SDK
        run: npm run build

      - name: Run Tests
        run: npm test
